// ─── SMALL COMPONENTS ────────────────────────────────────────────────────────

function Tag({ label, color }) {
  return <span style={{ display:"inline-block", padding:"2px 8px", borderRadius:4, fontSize:11, fontWeight:600, background:color+"22", color, border:`1px solid ${color}44`, marginRight:4, marginBottom:4 }}>{label}</span>;
}
function Pill({ label }) {
  return <span style={{ display:"inline-block", background:C.tag, border:`1px solid ${C.border}`, borderRadius:20, padding:"3px 10px", fontSize:12, color:C.muted, marginRight:6, marginBottom:6 }}>{label}</span>;
}
function Sec({ title, color, children }) {
  return (
    <div style={{ background:C.surfaceLight, borderRadius:10, padding:"14px 16px", marginBottom:12, borderLeft:`3px solid ${color}` }}>
      <div style={{ fontSize:11, fontWeight:700, color, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:10 }}>{title}</div>
      {children}
    </div>
  );
}

// ─── WEB MAP SVG ─────────────────────────────────────────────────────────────

function WebMap({ onNodeClick }) {
  const [hovered, setHovered] = useState(null);

  // 8 nodes — one per meaningful stage. All detail lives in Stage Detail panels.
  const nodes = [
    { id:"brand",   x:390, y:58,  w:200, h:52, label:"Brand Awareness",      sub:"TV · CTV · YouTube · LinkedIn · Meta · Reddit · Audio",  color:C.brand  },
    { id:"tiers",   x:390, y:160, w:320, h:52, label:"Engagement Scoring",   sub:"Tier 3: Aware  →  Initial Engagement  →  Meaningful Engagement", color:C.tier2 },
    { id:"paidsoc", x:150, y:266, w:172, h:48, label:"Paid Social",          sub:"Meta · LinkedIn · Reddit · TikTok",                      color:C.mid    },
    { id:"stackadapt",x:390,y:266,w:164, h:48, label:"StackAdapt",           sub:"Programmatic Display",                                   color:C.sa     },
    { id:"email",   x:620, y:266, w:164, h:48, label:"Email Nurture",        sub:"Welcome · Contextual · Post-MQL1",                       color:C.email  },
    { id:"midfunnel",x:270,y:372, w:232, h:52, label:"Mid-Funnel Engagement",sub:"Broad Funnel  ·  CXO Funnel  ·  Themed Content Packs",   color:C.mid    },
    { id:"retargeting",x:390,y:478,w:220,h:52, label:"Retargeting",          sub:"Omnipresent · Conversation Ads · Offer Ads",             color:C.rtg    },
    { id:"won",     x:390, y:578, w:200, h:52, label:"Closed Won 🎉",        sub:"MQL1 → SAO → New Customer",                             color:C.win    },
  ];

  const edges = [
    { from:"brand",      to:"tiers",      color:C.tier2, dash:false },
    { from:"tiers",      to:"paidsoc",    color:C.mid,   dash:false },
    { from:"tiers",      to:"stackadapt", color:C.sa,    dash:false },
    { from:"tiers",      to:"email",      color:C.email, dash:false },
    { from:"paidsoc",    to:"midfunnel",  color:C.mid,   dash:false },
    { from:"stackadapt", to:"midfunnel",  color:C.mid,   dash:false, opacity:0.5 },
    { from:"email",      to:"won",        color:C.email, dash:false, opacity:0.5 },
    { from:"midfunnel",  to:"retargeting",color:C.rtg,   dash:false },
    { from:"midfunnel",  to:"email",      color:C.email, dash:true,  opacity:0.5 },
    { from:"retargeting",to:"won",        color:C.win,   dash:false },
    { from:"retargeting",to:"email",      color:C.email, dash:true,  opacity:0.5 },
    { from:"won",        to:"brand",      color:C.gold,  dash:true,  opacity:0.22, curve:true },
  ];

  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  function getPath(e) {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return "";
    if (e.curve) {
      const ax = a.x, ay = a.y - a.h / 2;
      const bx = b.x, by = b.y + b.h / 2;
      return `M${ax},${ay} C${ax-260},${ay-50} ${bx-260},${by+50} ${bx},${by}`;
    }
    const fromY = a.y + a.h / 2, toY = b.y - b.h / 2;
    const fromX = a.x, toX = b.x;
    const mx = (fromX + toX) / 2, my = (fromY + toY) / 2;
    const offset = Math.abs(toX - fromX) > 60 ? (toX > fromX ? 22 : -22) : 0;
    return `M${fromX},${fromY} Q${mx+offset},${my} ${toX},${toY}`;
  }

  const nodeToStage = {
    brand:"brand", tiers:"tiers",
    paidsoc:"midfunnel", stackadapt:"stackadapt", email:"email",
    midfunnel:"midfunnel", retargeting:"retargeting", won:null,
  };

  const VB_W = 780, VB_H = 680;

  return (
    <svg viewBox={`0 0 ${VB_W} ${VB_H}`} style={{ width:"100%", height:"auto", display:"block" }} xmlns="http://www.w3.org/2000/svg">
      <defs>
        {nodes.map(n => (
          <linearGradient key={n.id} id={`g_${n.id}`} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={n.color} stopOpacity="0.6"/>
            <stop offset="100%" stopColor={n.color} stopOpacity="0.25"/>
          </linearGradient>
        ))}
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <polygon points="0 0, 6 3, 0 6" fill={C.muted} opacity="0.6"/>
        </marker>
      </defs>

      <rect width={VB_W} height={VB_H} fill={C.bg} rx="14"/>

      {/* Swim lane bands */}
      {[
        { y:24,  h:80,  label:"BRAND AWARENESS",          color:C.brand  },
        { y:114, h:80,  label:"ENGAGEMENT SCORING",        color:C.tier2  },
        { y:204, h:80,  label:"CHANNEL ENTRY  (CONCURRENT)", color:C.sa   },
        { y:294, h:80,  label:"MID-FUNNEL ENGAGEMENT",     color:C.mid    },
        { y:384, h:154, label:"CONVERSION",                color:C.win    },
      ].map(lane => (
        <g key={lane.label}>
          <rect x="8" y={lane.y} width={VB_W-16} height={lane.h} rx="8"
            fill={lane.color} fillOpacity="0.04"
            stroke={lane.color} strokeOpacity="0.12" strokeWidth="1"/>
          <text x="20" y={lane.y+14} fontSize="8.5" fontWeight="800"
            fill={lane.color} fillOpacity="0.5" letterSpacing="1.8"
            fontFamily="'Inter', sans-serif">{lane.label}</text>
        </g>
      ))}

      {/* Edges */}
      {edges.map((e, i) => (
        <path key={i} d={getPath(e)} fill="none"
          stroke={e.color} strokeOpacity={e.opacity ?? 0.55}
          strokeWidth={2} strokeDasharray={e.dash ? "5 4" : undefined}
          markerEnd="url(#arr)"/>
      ))}

      {/* Nodes */}
      {nodes.map(n => {
        const isHov = hovered === n.id;
        const stageId = nodeToStage[n.id];
        const clickable = !!stageId;
        const hw = n.w/2, hh = n.h/2, rx = Math.min(hh, 14);
        return (
          <g key={n.id} style={{ cursor: clickable ? "pointer" : "default" }}
            onMouseEnter={() => setHovered(n.id)}
            onMouseLeave={() => setHovered(null)}
            onClick={() => clickable && onNodeClick(stageId)}>
            {isHov && (
              <rect x={n.x-hw-8} y={n.y-hh-8} width={n.w+16} height={n.h+16} rx={rx+8}
                fill={n.color} fillOpacity="0.2" filter="url(#glow)"/>
            )}
            <rect x={n.x-hw} y={n.y-hh} width={n.w} height={n.h} rx={rx}
              fill={`url(#g_${n.id})`} stroke={n.color}
              strokeWidth={isHov ? 2.5 : 1.6} strokeOpacity={isHov ? 1 : 0.7}/>
            <text x={n.x} y={n.y-5} textAnchor="middle"
              fontSize={13} fontWeight="700"
              fill={C.text} fontFamily="'Inter', -apple-system, sans-serif">{n.label}</text>
            <text x={n.x} y={n.y+11} textAnchor="middle"
              fontSize={9} fill={C.muted}
              fontFamily="'Inter', -apple-system, sans-serif">{n.sub}</text>
          </g>
        );
      })}

      {/* Tap hint */}
      <text x={VB_W/2} y={VB_H-22} textAnchor="middle" fontSize="9.5"
        fill={C.muted} fontFamily="'Inter', sans-serif">
        Tap any node to explore stage details  ·  Dashed lines = concurrent flows  ·  Gold = retention loop
      </text>
    </svg>
  );
}

          </div>

          {/* Signal */}
          <div style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:16, padding:"10px 14px", background:C.tag, borderRadius:8, border:`1px solid ${step.color}33` }}>
            <span style={{ fontSize:14, flexShrink:0 }}>⚡</span>
            <div style={{ fontSize:12, color:C.muted, lineHeight:1.55 }}>
              <span style={{ color:step.color, fontWeight:700 }}>Signal / Threshold: </span>{step.signal}
            </div>
          </div>

          {/* Channels */}
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>Active Channels</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {step.channels.map(ch => (
                <span key={ch} style={{ padding:"4px 10px", borderRadius:20, background:step.color+"18", border:`1px solid ${step.color}33`, fontSize:12, fontWeight:500, color:step.color }}>{ch}</span>
              ))}
            </div>
          </div>

          {/* Content examples */}
          {step.content && (
            <div>
              <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>
                {step.phase === "Mid-Funnel Paid Social & StackAdapt" ? "Content Pack Creative (by theme)" :
                 step.phase === "Deeper Mid-Funnel Engagement" ? "Funnel Tracks" :
                 step.phase === "Retargeting" ? "Retargeting Tactics" :
                 step.phase === "Email Capture & Nurture" ? "Email Sequences" : ""}
              </div>
              {step.content.map(c => (
                <div key={c.pack} style={{ display:"flex", gap:10, padding:"10px 12px", background:C.surfaceLight, borderRadius:8, marginBottom:8, borderLeft:`3px solid ${c.color}` }}>
                  <span style={{ fontSize:18, flexShrink:0 }}>{c.icon}</span>
                  <div>
                    <div style={{ fontSize:12, fontWeight:700, color:c.color, marginBottom:3 }}>{c.pack}</div>
                    <div style={{ fontSize:12, color:C.muted, lineHeight:1.55 }}>{c.example}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* StackAdapt operational note */}
          {step.stackadaptNote && (
            <div style={{ display:"flex", gap:8, alignItems:"flex-start", marginTop:12, padding:"10px 14px", background:C.sa+"12", border:`1px solid ${C.sa}33`, borderRadius:8 }}>
              <span style={{ fontSize:14, flexShrink:0 }}>📺</span>
              <div style={{ fontSize:12, color:C.muted, lineHeight:1.6 }}>
                <span style={{ color:C.sa, fontWeight:700 }}>StackAdapt note: </span>{step.stackadaptNote}
              </div>
            </div>
          )}

          {/* Navigation */}
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:20, gap:10 }}>
            <button
              onClick={() => setActive(Math.max(0, active-1))}
              disabled={active === 0}
              style={{ flex:1, padding:"10px", borderRadius:8, border:`1px solid ${C.border}`, background: active===0 ? "transparent" : C.surfaceLight, color: active===0 ? C.border : C.text, fontSize:13, fontWeight:600, cursor: active===0 ? "default" : "pointer" }}
            >← Previous</button>
            <button
              onClick={() => setActive(Math.min(journeySteps.length-1, active+1))}
              disabled={active === journeySteps.length-1}
              style={{ flex:1, padding:"10px", borderRadius:8, border:`1px solid ${active===journeySteps.length-1 ? C.border : step.color}`, background: active===journeySteps.length-1 ? "transparent" : step.color+"22", color: active===journeySteps.length-1 ? C.border : step.color, fontSize:13, fontWeight:600, cursor: active===journeySteps.length-1 ? "default" : "pointer" }}
            >Next →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useState("mission"); // mission | map | detail
  const [activeStage, setActiveStage] = useState("brand");

  function handleNodeClick(stageId) {
    setActiveStage(stageId);
    setView("detail");
  }

  const stage = stageData.find(s => s.id === activeStage);

  const navItems = [
    { id:"mission",  label:"Mission",          icon:"🏆" },
    { id:"map",      label:"Journey Map",       icon:"🗺️" },
    { id:"journey",  label:"Prospect Journey",  icon:"🧭" },
    { id:"detail",   label:"Stage Detail",      icon:"📋" },
  ];

  return (
    <div style={{ background:C.bg, minHeight:"100vh", fontFamily:"'Inter', -apple-system, BlinkMacSystemFont, sans-serif", color:C.text, boxSizing:"border-box" }}>
      {/* Top header */}
      <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"14px 20px 0", position:"sticky", top:0, zIndex:50 }}>
        <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:2 }}>BambooHR · H2 2026</div>
        <div style={{ fontSize:17, fontWeight:800, color:C.text, marginBottom:12 }}>Prospect Journey Map</div>
        <div style={{ display:"flex", gap:2 }}>
          {navItems.map(n => (
            <button key={n.id} onClick={() => setView(n.id)} style={{ background:"none", border:"none", borderBottom:`2px solid ${view===n.id ? C.gold : "transparent"}`, color:view===n.id ? C.gold : C.muted, fontSize:12, fontWeight:600, padding:"8px 14px 6px", cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
              <span>{n.icon}</span>{n.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding:"20px 20px 40px" }}>
        {view === "mission"  && <Mission/>}
        {view === "journey"  && <ProspectJourney/>}

        {view === "map" && (
          <div>
            <div style={{ fontSize:13, color:C.muted, marginBottom:16, lineHeight:1.6 }}>
              Tap any node to jump to its stage detail. Solid lines = primary paths · Dashed lines = tactical branches · Color = funnel stage.
            </div>
            <div style={{ background:C.surface, borderRadius:16, border:`1px solid ${C.border}`, padding:"16px 12px", overflow:"hidden" }}>
              <WebMap onNodeClick={handleNodeClick}/>
            </div>
            {/* Stage jump buttons */}
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:16 }}>
              {stageData.map(s => (
                <button key={s.id} onClick={() => { setActiveStage(s.id); setView("detail"); }} style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 14px", background:C.surfaceLight, border:`1px solid ${s.color}55`, borderRadius:20, cursor:"pointer", fontSize:12, fontWeight:600, color:s.colorLight }}>
                  <span>{s.icon}</span>{s.label}
                </button>
              ))}
            </div>
          </div>
        )}

        {view === "detail" && (
          <div>
            {/* Stage switcher */}
            <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
              {stageData.map(s => (
                <button key={s.id} onClick={() => setActiveStage(s.id)} style={{ padding:"6px 12px", borderRadius:20, border:`1.5px solid ${activeStage===s.id ? s.color : C.border}`, background:activeStage===s.id ? s.color+"22" : "transparent", color:activeStage===s.id ? s.colorLight : C.muted, fontSize:12, fontWeight:600, cursor:"pointer" }}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
            <StageDetail stage={stage}/>
          </div>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
